# SeccompProfile for nginx (webapp)
# Requires Security Profiles Operator
# Reference: https://github.com/kubernetes-sigs/security-profiles-operator
apiVersion: security-profiles-operator.x-k8s.io/v1beta1
kind: SeccompProfile
metadata:
  name: graph-italia-nginx-seccomp
  namespace: graph-italia
spec:
  defaultAction: SCMP_ACT_ERRNO
  architectures:
    - SCMP_ARCH_X86_64
    - SCMP_ARCH_AARCH64
  syscalls:
    # Memory and process management
    - action: SCMP_ACT_ALLOW
      names:
        - brk
        - mmap
        - munmap
        - mprotect
        - mremap
        - clone
        - clone3
        - futex
        - set_robust_list
        - get_robust_list
        - set_tid_address
        - exit
        - exit_group
        - wait4
        - prctl
        - arch_prctl
        - getpid
        - gettid
        - getppid
        - getuid
        - geteuid
        - getgid
        - getegid
        - getgroups
        - setgroups
        - setuid
        - setgid
        - setreuid
        - setregid
        - capget
        - capset
    
    # File operations (read-only focused)
    - action: SCMP_ACT_ALLOW
      names:
        - read
        - pread64
        - readv
        - write
        - pwrite64
        - writev
        - open
        - openat
        - openat2
        - close
        - close_range
        - fstat
        - newfstatat
        - statx
        - lstat
        - stat
        - lseek
        - access
        - faccessat
        - faccessat2
        - fcntl
        - flock
        - ftruncate
        - dup
        - dup2
        - dup3
        - pipe
        - pipe2
        - getcwd
        - chdir
        - fchdir
        - readlink
        - readlinkat
        - getdents
        - getdents64
        - umask
        - uname
    
    # Network operations (nginx needs these)
    - action: SCMP_ACT_ALLOW
      names:
        - socket
        - socketpair
        - bind
        - listen
        - accept
        - accept4
        - connect
        - getsockname
        - getpeername
        - sendto
        - sendmsg
        - sendmmsg
        - recvfrom
        - recvmsg
        - recvmmsg
        - setsockopt
        - getsockopt
        - shutdown
        - epoll_create
        - epoll_create1
        - epoll_ctl
        - epoll_wait
        - epoll_pwait
        - epoll_pwait2
        - select
        - pselect6
        - poll
        - ppoll
    
    # Signals and timing
    - action: SCMP_ACT_ALLOW
      names:
        - rt_sigaction
        - rt_sigprocmask
        - rt_sigreturn
        - rt_sigsuspend
        - sigaltstack
        - kill
        - tgkill
        - clock_gettime
        - clock_getres
        - clock_nanosleep
        - nanosleep
        - gettimeofday
        - time
        - times
    
    # IO and misc
    - action: SCMP_ACT_ALLOW
      names:
        - ioctl
        - eventfd
        - eventfd2
        - timerfd_create
        - timerfd_settime
        - timerfd_gettime
        - getrandom
        - sysinfo
        - getrlimit
        - prlimit64
        - sched_getaffinity
        - sched_yield
        - rseq
