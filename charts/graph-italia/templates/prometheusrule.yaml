{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "graph-italia.fullname" . }}
  labels:
    {{- include "graph-italia.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    # ==========================================================================
    # CRITICAL ALERTS ONLY - Real problems that need immediate attention
    # ==========================================================================
    - name: graph-italia.critical
      rules:
        # -----------------------------------------------------------------------
        # Application Down - No pods running
        # -----------------------------------------------------------------------
        # Fires only when the deployment *wants* replicas but has none available,
        # so intentional scale-to-zero (e.g. nightly scaler in test environments,
        # or `helm uninstall`) does not trigger a false positive.
        - alert: GraphItaliaDown
          expr: |
            sum(kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}", deployment=~".*graph-italia.*"}) == 0
              and
            sum(kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}", deployment=~".*graph-italia.*"}) > 0
          for: 2m
          labels:
            severity: critical
            service: graph-italia
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "Graph Italia is DOWN - No pods running"
            description: "Deployment {{ "{{ $labels.deployment }}" }} has 0 available replicas for 2+ minutes"

        # -----------------------------------------------------------------------
        # High Server Error Rate (5xx > 10% for 5 minutes)
        # -----------------------------------------------------------------------
        - alert: GraphItaliaHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{status=~"5..", namespace="{{ .Release.Namespace }}"}[5m]))
              /
              sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}"}[5m]))
            ) > 0.10
          for: 5m
          labels:
            severity: critical
            service: graph-italia
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "High 5xx error rate on Graph Italia"
            description: "Server error rate is {{ "{{ $value | humanizePercentage }}" }} (>10%) for 5+ minutes"

        # -----------------------------------------------------------------------
        # Database Connection Errors
        # -----------------------------------------------------------------------
        - alert: GraphItaliaDatabaseErrors
          expr: |
            sum(rate(graph_italia_db_queries_total{status="error", namespace="{{ .Release.Namespace }}"}[5m])) > 0.5
          for: 3m
          labels:
            severity: critical
            service: graph-italia
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "Database errors on Graph Italia"
            description: 'Database error rate: {{ "{{ $value | printf \"%.2f\" }}" }} errors/sec for 3+ minutes'

        # -----------------------------------------------------------------------
        # Pod CrashLooping (more than 5 restarts in 30 min)
        # -----------------------------------------------------------------------
        - alert: GraphItaliaCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", pod=~".*graph-italia.*"}[30m]) > 5
          for: 5m
          labels:
            severity: critical
            service: graph-italia
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "Graph Italia pod is crash-looping"
            description: 'Pod {{ "{{ $labels.pod }}" }} has restarted {{ "{{ $value | printf \"%.0f\" }}" }} times in 30 minutes'

        # -----------------------------------------------------------------------
        # Application completely unresponsive (latency > 30s)
        # -----------------------------------------------------------------------
        - alert: GraphItaliaUnresponsive
          expr: |
            histogram_quantile(0.95, 
              sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m])) by (le)
            ) > 30
          for: 5m
          labels:
            severity: critical
            service: graph-italia
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "Graph Italia is unresponsive"
            description: "p95 latency is {{ "{{ $value | humanizeDuration }}" }} (>30s) - application may be stuck"

        # -----------------------------------------------------------------------
        # Out of Memory (>95% memory used)
        # -----------------------------------------------------------------------
        - alert: GraphItaliaOutOfMemory
          expr: |
            (
              max(container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}", container=~"server|webapp"})
              /
              max(container_spec_memory_limit_bytes{namespace="{{ .Release.Namespace }}", container=~"server|webapp"})
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            service: graph-italia
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "Graph Italia is running out of memory"
            description: "Container {{ "{{ $labels.container }}" }} is at {{ "{{ $value | humanizePercentage }}" }} memory - OOM imminent"

    # ==========================================================================
    # WARNING ALERTS - Noteworthy, not a page-worthy critical incident
    # ==========================================================================
    - name: graph-italia.warning
      rules:
        # -----------------------------------------------------------------------
        # Ingress/WAF - High block rate (potential attack or misconfiguration)
        # -----------------------------------------------------------------------
        # Guarded by a minimum-traffic floor: at low volume a handful of scanner
        # 4xx (e.g. 404s) easily exceeds the 30% ratio and trips a false
        # positive. Requiring >5 req/s of total ingress traffic means this only
        # fires on a genuine high-volume 4xx storm. Scoped to this release's own
        # namespace via exported_namespace (the nginx `namespace` label is the
        # controller's ns, not the ingress's). severity=warning so it is not
        # treated as a critical incident (was a noisy critical false positive —
        # see k8s-configuration/RIGHTSIZING.md).
        - alert: GraphItaliaHighWAFBlocks
          expr: |
            (
              sum(rate(nginx_ingress_controller_requests{status=~"4..", exported_namespace="{{ .Release.Namespace }}"}[10m]))
              /
              sum(rate(nginx_ingress_controller_requests{exported_namespace="{{ .Release.Namespace }}"}[10m]))
            ) > 0.30
            and
            sum(rate(nginx_ingress_controller_requests{exported_namespace="{{ .Release.Namespace }}"}[10m])) > 5
          for: 10m
          labels:
            severity: warning
            service: graph-italia
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "High 4xx rate on Graph Italia ingress - possible attack or WAF issue"
            description: "{{ "{{ $value | humanizePercentage }}" }} of requests are returning 4xx (>30%) at >5 req/s for 10+ minutes"
{{- end }}
