{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "graph-italia.fullname" . }}
  labels:
    {{- include "graph-italia.labels" . | nindent 4 }}
  annotations:
    {{- /* User-defined annotations */}}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- /* ModSecurity WAF annotations */}}
    {{- /* Note: modsecurity-snippet requires allow-snippet-annotations=true in ingress-nginx config */}}
    {{- /* Without snippet, ModSecurity uses global config (DetectionOnly by default) */}}
    {{- if and .Values.ingress.modsecurity .Values.ingress.modsecurity.enabled }}
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    {{- if .Values.ingress.modsecurity.owasp }}
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    {{- end }}
    {{- end }}
    {{- /* Rate limiting annotations */}}
    {{- if and .Values.ingress.rateLimit .Values.ingress.rateLimit.enabled }}
    nginx.ingress.kubernetes.io/limit-rps: {{ .Values.ingress.rateLimit.rps | default 10 | quote }}
    nginx.ingress.kubernetes.io/limit-burst-multiplier: {{ .Values.ingress.rateLimit.burst | default 20 | quote }}
    nginx.ingress.kubernetes.io/limit-connections: {{ .Values.ingress.rateLimit.connections | default 10 | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hosts }}
    {{- /* Multiple hosts mode */}}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "webapp" }}{{ include "graph-italia.fullname" $ }}-webapp{{ else if eq .service "server" }}{{ include "graph-italia.fullname" $ }}-server{{ else }}{{ .service }}{{ end }}
                port:
                  number: {{ if eq .service "webapp" }}{{ $.Values.webapp.service.port }}{{ else if eq .service "server" }}{{ $.Values.server.service.port }}{{ else }}{{ .port }}{{ end }}
          {{- end }}
    {{- end }}
    {{- else if .Values.ingress.host }}
    {{- /* Single host mode with paths */}}
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if .Values.webapp.enabled }}
          - path: {{ .Values.ingress.paths.webapp.path }}
            pathType: {{ .Values.ingress.paths.webapp.pathType }}
            backend:
              service:
                name: {{ include "graph-italia.fullname" . }}-webapp
                port:
                  number: {{ .Values.webapp.service.port }}
          {{- end }}
          {{- if .Values.server.enabled }}
          - path: {{ .Values.ingress.paths.server.path }}
            pathType: {{ .Values.ingress.paths.server.pathType }}
            backend:
              service:
                name: {{ include "graph-italia.fullname" . }}-server
                port:
                  number: {{ .Values.server.service.port }}
          {{- end }}
    {{- end }}
{{- end }}

