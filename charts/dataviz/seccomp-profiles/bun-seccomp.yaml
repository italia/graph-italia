# SeccompProfile for Bun/Node.js (server)
# Requires Security Profiles Operator
# Reference: https://github.com/kubernetes-sigs/security-profiles-operator
apiVersion: security-profiles-operator.x-k8s.io/v1beta1
kind: SeccompProfile
metadata:
  name: dataviz-bun-seccomp
  namespace: dataviz
spec:
  defaultAction: SCMP_ACT_ERRNO
  architectures:
    - SCMP_ARCH_X86_64
    - SCMP_ARCH_AARCH64
  syscalls:
    # Memory and process management (Bun/V8 needs more)
    - action: SCMP_ACT_ALLOW
      names:
        - brk
        - mmap
        - munmap
        - mprotect
        - mremap
        - madvise
        - clone
        - clone3
        - futex
        - set_robust_list
        - get_robust_list
        - set_tid_address
        - exit
        - exit_group
        - wait4
        - waitid
        - prctl
        - arch_prctl
        - getpid
        - gettid
        - getppid
        - getuid
        - geteuid
        - getgid
        - getegid
        - getgroups
        - setgroups
        - setuid
        - setgid
        - setreuid
        - setregid
        - capget
        - capset
        - seccomp
    
    # File operations (Prisma, file uploads, etc.)
    - action: SCMP_ACT_ALLOW
      names:
        - read
        - pread64
        - readv
        - write
        - pwrite64
        - writev
        - open
        - openat
        - openat2
        - close
        - close_range
        - fstat
        - newfstatat
        - statx
        - lstat
        - stat
        - lseek
        - access
        - faccessat
        - faccessat2
        - fcntl
        - flock
        - ftruncate
        - truncate
        - dup
        - dup2
        - dup3
        - pipe
        - pipe2
        - getcwd
        - chdir
        - fchdir
        - readlink
        - readlinkat
        - getdents
        - getdents64
        - umask
        - uname
        - unlink
        - unlinkat
        - rename
        - renameat
        - renameat2
        - mkdir
        - mkdirat
        - rmdir
        - symlink
        - symlinkat
        - link
        - linkat
        - fchmod
        - fchmodat
        - chmod
        - fchown
        - fchownat
        - chown
        - utimensat
        - futimesat
        - copy_file_range
        - splice
        - tee
        - sendfile
        - statfs
        - fstatfs
    
    # Network operations (HTTP server, DB connections, external APIs)
    - action: SCMP_ACT_ALLOW
      names:
        - socket
        - socketpair
        - bind
        - listen
        - accept
        - accept4
        - connect
        - getsockname
        - getpeername
        - sendto
        - sendmsg
        - sendmmsg
        - recvfrom
        - recvmsg
        - recvmmsg
        - setsockopt
        - getsockopt
        - shutdown
        - epoll_create
        - epoll_create1
        - epoll_ctl
        - epoll_wait
        - epoll_pwait
        - epoll_pwait2
        - select
        - pselect6
        - poll
        - ppoll
    
    # Signals and timing
    - action: SCMP_ACT_ALLOW
      names:
        - rt_sigaction
        - rt_sigprocmask
        - rt_sigreturn
        - rt_sigsuspend
        - rt_sigpending
        - rt_sigtimedwait
        - sigaltstack
        - kill
        - tgkill
        - clock_gettime
        - clock_getres
        - clock_nanosleep
        - nanosleep
        - gettimeofday
        - time
        - times
        - alarm
        - setitimer
        - getitimer
    
    # IO, crypto and misc (TLS, JWT, hashing)
    - action: SCMP_ACT_ALLOW
      names:
        - ioctl
        - eventfd
        - eventfd2
        - timerfd_create
        - timerfd_settime
        - timerfd_gettime
        - getrandom
        - sysinfo
        - getrlimit
        - setrlimit
        - prlimit64
        - sched_getaffinity
        - sched_setaffinity
        - sched_yield
        - sched_get_priority_min
        - sched_get_priority_max
        - rseq
        - memfd_create
        - io_uring_setup
        - io_uring_enter
        - io_uring_register
    
    # Process execution (for Prisma CLI during migrations)
    - action: SCMP_ACT_ALLOW
      names:
        - execve
        - execveat
        - vfork
        - fork
