{{- if .Values.networkPolicy.enabled }}
{{- if .Values.webapp.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dataviz.fullname" . }}-webapp
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    component: webapp
spec:
  podSelector:
    matchLabels:
      {{- include "dataviz.selectorLabels" . | nindent 6 }}
      component: webapp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
    {{- end }}
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
    {{- end }}
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowDNS }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    {{- end }}
    {{- if .Values.server.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "dataviz.selectorLabels" . | nindent 14 }}
              component: server
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
---
{{- end }}
{{- if .Values.server.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dataviz.fullname" . }}-server
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    component: server
spec:
  podSelector:
    matchLabels:
      {{- include "dataviz.selectorLabels" . | nindent 6 }}
      component: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.webapp.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "dataviz.selectorLabels" . | nindent 14 }}
              component: webapp
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- end }}
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
    {{- end }}
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
    {{- end }}
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowDNS }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}

