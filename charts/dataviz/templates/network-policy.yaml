{{- if .Values.networkPolicy.enabled }}
{{- if .Values.webapp.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dataviz.fullname" . }}-webapp
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    component: webapp
spec:
  podSelector:
    matchLabels:
      {{- include "dataviz.selectorLabels" . | nindent 6 }}
      component: webapp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
    {{- end }}
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
    {{- end }}
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowDNS }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    {{- end }}
    {{- if .Values.server.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "dataviz.selectorLabels" . | nindent 14 }}
              component: server
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
---
{{- end }}
{{- if .Values.server.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dataviz.fullname" . }}-server
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    component: server
spec:
  podSelector:
    matchLabels:
      {{- include "dataviz.selectorLabels" . | nindent 6 }}
      component: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.webapp.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "dataviz.selectorLabels" . | nindent 14 }}
              component: webapp
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- end }}
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
    {{- end }}
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
    {{- end }}
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- /* DNS resolution */}}
    {{- if .Values.networkPolicy.allowDNS }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- /* PostgreSQL database access */}}
    {{- if and .Values.networkPolicy.serverEgress .Values.networkPolicy.serverEgress.postgresql .Values.networkPolicy.serverEgress.postgresql.enabled }}
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.serverEgress.postgresql.cidr }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.serverEgress.postgresql.port | default 5432 }}
    {{- end }}
    {{- /* Cloudflare APIs (OpenAI, Resend, etc.) */}}
    {{- if and .Values.networkPolicy.serverEgress .Values.networkPolicy.serverEgress.cloudflareAPIs .Values.networkPolicy.serverEgress.cloudflareAPIs.enabled }}
    {{- range .Values.networkPolicy.serverEgress.cloudflareAPIs.cidrs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - protocol: TCP
          port: {{ $.Values.networkPolicy.serverEgress.cloudflareAPIs.port | default 443 }}
    {{- end }}
    {{- end }}
    {{- /* Custom external endpoints */}}
    {{- if and .Values.networkPolicy.serverEgress .Values.networkPolicy.serverEgress.custom }}
    {{- range .Values.networkPolicy.serverEgress.custom }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      ports:
        - protocol: TCP
          port: {{ .port }}
    {{- end }}
    {{- end }}
    {{- /* Additional raw egress rules */}}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}

