{{- /*
  Grafana Dashboard ConfigMap
  
  This template creates a ConfigMap containing the Grafana dashboard JSON.
  The dashboard can be automatically discovered by Grafana's sidecar if configured.
  
  Usage Options:
  1. Automatic (via Helm): Enable monitoring.grafanaDashboard.enabled in values.yaml
  2. Manual Import: Import charts/dataviz/dashboards/dataviz-dashboard.json directly into Grafana
  
  See charts/dataviz/dashboards/README.md for details.
*/ -}}
{{- if .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dataviz.fullname" . }}-dashboard
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    {{- with .Values.monitoring.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.monitoring.grafanaDashboard.namespace }}
  namespace: {{ .Values.monitoring.grafanaDashboard.namespace }}
  {{- end }}
data:
  dataviz-dashboard.json: |-
{{ .Files.Get "dashboards/dataviz-dashboard.json" | indent 4 }}
{{- end }}
