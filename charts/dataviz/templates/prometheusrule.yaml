{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "dataviz.fullname" . }}
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    # ==========================================================================
    # CRITICAL ALERTS ONLY - Real problems that need immediate attention
    # ==========================================================================
    - name: dataviz.critical
      rules:
        # -----------------------------------------------------------------------
        # Application Down - No pods running
        # -----------------------------------------------------------------------
        - alert: DatavizDown
          expr: |
            sum(kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}", deployment=~".*dataviz.*"}) == 0
          for: 2m
          labels:
            severity: critical
            service: dataviz
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "DataViz is DOWN - No pods running"
            description: "Deployment {{ "{{ $labels.deployment }}" }} has 0 available replicas for 2+ minutes"

        # -----------------------------------------------------------------------
        # High Server Error Rate (5xx > 10% for 5 minutes)
        # -----------------------------------------------------------------------
        - alert: DatavizHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{status=~"5..", namespace="{{ .Release.Namespace }}"}[5m]))
              /
              sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}"}[5m]))
            ) > 0.10
          for: 5m
          labels:
            severity: critical
            service: dataviz
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "High 5xx error rate on DataViz"
            description: "Server error rate is {{ "{{ $value | humanizePercentage }}" }} (>10%) for 5+ minutes"

        # -----------------------------------------------------------------------
        # Database Connection Errors
        # -----------------------------------------------------------------------
        - alert: DatavizDatabaseErrors
          expr: |
            sum(rate(dataviz_db_queries_total{status="error", namespace="{{ .Release.Namespace }}"}[5m])) > 0.5
          for: 3m
          labels:
            severity: critical
            service: dataviz
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "Database errors on DataViz"
            description: "Database error rate: {{ "{{ $value | humanize }}" }} errors/sec for 3+ minutes"

        # -----------------------------------------------------------------------
        # Pod CrashLooping (more than 5 restarts in 30 min)
        # -----------------------------------------------------------------------
        - alert: DatavizCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", pod=~".*dataviz.*"}[30m]) > 5
          for: 5m
          labels:
            severity: critical
            service: dataviz
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "DataViz pod is crash-looping"
            description: "Pod {{ "{{ $labels.pod }}" }} has restarted {{ "{{ $value | humanize }}" }} times in 30 minutes"

        # -----------------------------------------------------------------------
        # Ingress/WAF - High block rate (potential attack or misconfiguration)
        # -----------------------------------------------------------------------
        - alert: DatavizHighWAFBlocks
          expr: |
            (
              sum(rate(nginx_ingress_controller_requests{status=~"4..", ingress=~".*dataviz.*"}[10m]))
              /
              sum(rate(nginx_ingress_controller_requests{ingress=~".*dataviz.*"}[10m]))
            ) > 0.30
          for: 10m
          labels:
            severity: critical
            service: dataviz
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "High 4xx rate on DataViz ingress - possible attack or WAF issue"
            description: "{{ "{{ $value | humanizePercentage }}" }} of requests are returning 4xx (>30%) for 10+ minutes"

        # -----------------------------------------------------------------------
        # Application completely unresponsive (latency > 30s)
        # -----------------------------------------------------------------------
        - alert: DatavizUnresponsive
          expr: |
            histogram_quantile(0.95, 
              sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m])) by (le)
            ) > 30
          for: 5m
          labels:
            severity: critical
            service: dataviz
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "DataViz is unresponsive"
            description: "p95 latency is {{ "{{ $value | humanizeDuration }}" }} (>30s) - application may be stuck"

        # -----------------------------------------------------------------------
        # Out of Memory (>95% memory used)
        # -----------------------------------------------------------------------
        - alert: DatavizOutOfMemory
          expr: |
            (
              max(container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}", container=~"server|webapp"})
              /
              max(container_spec_memory_limit_bytes{namespace="{{ .Release.Namespace }}", container=~"server|webapp"})
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            service: dataviz
            namespace: {{ .Release.Namespace }}
          annotations:
            summary: "DataViz is running out of memory"
            description: "Container {{ "{{ $labels.container }}" }} is at {{ "{{ $value | humanizePercentage }}" }} memory - OOM imminent"
{{- end }}
