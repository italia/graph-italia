{{- if .Values.server.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dataviz.fullname" . }}-server
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    component: server
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dataviz.selectorLabels" . | nindent 4 }}
    component: server
{{- end }}

