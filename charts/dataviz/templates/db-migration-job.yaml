{{- if and .Values.server.enabled .Values.dbMigration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dataviz.fullname" . }}-db-migration-{{ .Release.Revision }}
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    component: db-migration
  annotations:
    # Run before deployment upgrade
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: {{ .Values.dbMigration.ttlSecondsAfterFinished | default 300 }}
  backoffLimit: {{ .Values.dbMigration.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        {{- include "dataviz.selectorLabels" . | nindent 8 }}
        component: db-migration
    spec:
      {{- if and .Values.imagePullSecret.enabled .Values.imagePullSecret.token }}
      imagePullSecrets:
        - name: {{ include "dataviz.fullname" . }}-image-pull-secret
      {{- end }}
      {{- if .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.server.nodeSelector | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migration
          image: "{{ .Values.imageRegistry }}/{{ .Values.imageRepository }}/{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          workingDir: /usr/src/app/packages/server
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "🔄 Starting database migration..."
              echo "📍 Working directory: $(pwd)"
              if [ -z "${DATABASE_URL:-}" ]; then
                echo "❌ DATABASE_URL is empty. Aborting migration job."
                exit 1
              fi

              MIGRATION_MODE="{{ .Values.dbMigration.mode | default "auto" }}"
              ALLOW_LEGACY_FALLBACK="{{ if hasKey .Values.dbMigration "allowLegacyDbPushFallback" }}{{ .Values.dbMigration.allowLegacyDbPushFallback }}{{ else }}true{{ end }}"
              LEGACY_AUTOMIGRATE="{{ if hasKey .Values.dbMigration "legacySchemaAutoMigrate" }}{{ .Values.dbMigration.legacySchemaAutoMigrate }}{{ else }}true{{ end }}"

              if [ "$LEGACY_AUTOMIGRATE" = "true" ]; then
                echo "🧭 Running legacy schema auto-migration bootstrap check..."
                bun run seeds/migrate-legacy-projects.ts

                if [ -f /tmp/legacy-schema-migrated ]; then
                  echo "🗂️ Legacy migration applied, baselining existing Prisma migrations..."
                  npx prisma migrate resolve --applied 20260331142948_init_projects --schema=prisma/schema.prisma
                  npx prisma migrate resolve --applied 20260331143614_remove_preview --schema=prisma/schema.prisma
                fi
              else
                echo "⏭️ legacySchemaAutoMigrate disabled, skipping legacy bootstrap."
              fi

              run_migrate_deploy() {
                echo "🔎 Running prisma migrate status..."
                if ! npx prisma migrate status --schema=prisma/schema.prisma; then
                  echo "❌ prisma migrate status failed."
                  echo "💡 Database may be out of sync due to manual changes."
                  echo "💡 Verify baseline/state before retrying deploy (for example with prisma migrate resolve)."
                  exit 1
                fi

                echo "🚀 Running prisma migrate deploy..."
                npx prisma migrate deploy --schema=prisma/schema.prisma
              }

              run_db_push() {
                echo "📊 Running legacy prisma db push..."
                npx prisma db push --schema=prisma/schema.prisma {{ if .Values.dbMigration.acceptDataLoss }}--accept-data-loss{{ end }}
              }

              HAS_VERSIONED_MIGRATIONS=false
              if ls prisma/migrations/*/migration.sql >/dev/null 2>&1; then
                HAS_VERSIONED_MIGRATIONS=true
              fi

              case "$MIGRATION_MODE" in
                migrateDeploy)
                  if [ "$HAS_VERSIONED_MIGRATIONS" != "true" ]; then
                    echo "❌ dbMigration.mode=migrateDeploy but no versioned migrations were found."
                    exit 1
                  fi
                  run_migrate_deploy
                  ;;
                dbPush)
                  run_db_push
                  ;;
                auto)
                  if [ "$HAS_VERSIONED_MIGRATIONS" = "true" ]; then
                    run_migrate_deploy
                  elif [ "$ALLOW_LEGACY_FALLBACK" = "true" ]; then
                    echo "⚠️ No versioned migrations found. Falling back to legacy db push."
                    run_db_push
                  else
                    echo "❌ No versioned migrations found and legacy fallback is disabled."
                    echo "💡 Set dbMigration.mode=dbPush for legacy releases or enable allowLegacyDbPushFallback."
                    exit 1
                  fi
                  ;;
                *)
                  echo "❌ Invalid dbMigration.mode: $MIGRATION_MODE (expected: auto | migrateDeploy | dbPush)"
                  exit 1
                  ;;
              esac

              echo "✅ Database migration completed successfully!"
          env:
            - name: DATABASE_URL
              {{- if .Values.dbMigration.databaseUrlFromSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbMigration.databaseUrlFromSecret.secretName }}
                  key: {{ .Values.dbMigration.databaseUrlFromSecret.key }}
              {{- else }}
              value: {{ .Values.server.env.DATABASE_URL | quote }}
              {{- end }}
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
{{- end }}
