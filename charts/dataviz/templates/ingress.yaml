{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dataviz.fullname" . }}
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hosts }}
    {{- /* Multiple hosts mode */}}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "webapp" }}{{ include "dataviz.fullname" $ }}-webapp{{ else if eq .service "server" }}{{ include "dataviz.fullname" $ }}-server{{ else }}{{ .service }}{{ end }}
                port:
                  number: {{ if eq .service "webapp" }}{{ $.Values.webapp.service.port }}{{ else if eq .service "server" }}{{ $.Values.server.service.port }}{{ else }}{{ .port }}{{ end }}
          {{- end }}
    {{- end }}
    {{- else if .Values.ingress.host }}
    {{- /* Single host mode with paths */}}
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if .Values.webapp.enabled }}
          - path: {{ .Values.ingress.paths.webapp.path }}
            pathType: {{ .Values.ingress.paths.webapp.pathType }}
            backend:
              service:
                name: {{ include "dataviz.fullname" . }}-webapp
                port:
                  number: {{ .Values.webapp.service.port }}
          {{- end }}
          {{- if .Values.server.enabled }}
          - path: {{ .Values.ingress.paths.server.path }}
            pathType: {{ .Values.ingress.paths.server.pathType }}
            backend:
              service:
                name: {{ include "dataviz.fullname" . }}-server
                port:
                  number: {{ .Values.server.service.port }}
          {{- end }}
    {{- end }}
{{- end }}

