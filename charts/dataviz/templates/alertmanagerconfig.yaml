{{- if .Values.monitoring.alertmanagerConfig.enabled }}
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: {{ include "dataviz.fullname" . }}-notifications
  namespace: monitoring
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    alertmanagerConfig: main
spec:
  receivers:
    - name: dataviz-email
      emailConfigs:
        - to: {{ .Values.monitoring.alertmanagerConfig.emailTo | quote }}
          from: {{ .Values.monitoring.alertmanagerConfig.emailFrom | default "dataviz@innovazione.gov.it" | quote }}
          smarthost: {{ .Values.monitoring.alertmanagerConfig.smarthost | default "smtp.eu.mailgun.org:587" | quote }}
          authUsername: {{ .Values.monitoring.alertmanagerConfig.authUsername | default "dataviz@innovazione.gov.it" | quote }}
          authPassword:
            name: {{ .Values.monitoring.alertmanagerConfig.authPasswordSecret | default "alertmanager-smtp-secret" }}
            key: {{ .Values.monitoring.alertmanagerConfig.authPasswordKey | default "password" }}
          requireTLS: true
          headers:
            - key: Subject
              value: '[{{ "{{ .Status | toUpper }}" }}] DataViz: {{ "{{ .CommonLabels.alertname }}" }}'
  route:
    receiver: dataviz-email
    groupBy:
      - alertname
      - namespace
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    matchers:
      - matchType: "=~"
        name: alertname
        value: "Dataviz.*"
    routes:
      - matchers:
          - matchType: "="
            name: severity
            value: critical
        receiver: dataviz-email
        repeatInterval: 1h
{{- end }}
