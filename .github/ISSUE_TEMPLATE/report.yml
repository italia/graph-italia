name: Report
description: Report an issue regarding a published page or chart
title: "[Report]: "
labels: ["report"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your report. Please fill in all required fields.

        > ⚠️ **Note:** the *Other* field should be filled in **only** if you selected "Other" as the reason.

  - type: input
    id: email
    attributes:
      label: Reporter email
      description: A valid email address where we can contact you.
      placeholder: name@example.com
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: Full URL of the page concerned by the report.
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: chart-url
    attributes:
      label: Chart URL
      description: URL of the chart (if applicable).
      placeholder: https://...
    validations:
      required: false

  - type: dropdown
    id: reason
    attributes:
      label: Reason
      description: Select the reason for the report.
      options:
        - Publication of sensitive data
        - Other
    validations:
      required: true

  - type: textarea
    id: other
    attributes:
      label: Other
      description: Fill in this field **only** if you selected "Other" as the reason. Describe the issue in detail.
      placeholder: Describe the reason here...
    validations:
      required: false
