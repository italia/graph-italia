name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: italia

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: 📋 Prepare
    runs-on: arc-runner-italia
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_production: ${{ steps.version.outputs.is_production }}
    steps:
      - name: 🏷️ Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_PRODUCTION="true"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="0.0.0-test.${SHORT_SHA}"
            IS_PRODUCTION="false"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_production=$IS_PRODUCTION" >> $GITHUB_OUTPUT

  build-images:
    name: 🏗️ Build Docker Images
    runs-on: arc-runner-italia
    needs: prepare
    strategy:
      matrix:
        include:
          - component: webapp
            dockerfile: packages/webapp/Dockerfile
            image: dataviz-webapp
          - component: server
            dockerfile: packages/server/Dockerfile.app
            image: dataviz-srv
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push ${{ matrix.component }} Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  package-helm:
    name: 📦 Package Helm Chart
    runs-on: arc-runner-italia
    needs: prepare
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚓ Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: 📦 Package and push Helm chart
        run: |
          helm package ./charts/dataviz --version ${{ needs.prepare.outputs.version }}
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          helm push dataviz-${{ needs.prepare.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: arc-runner-italia
    needs: [prepare, build-images, package-helm]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: read
    environment:
      name: production
    steps:
      - name: ⚓ Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Helm Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: 🛠️ Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: 🔗 Setup Kubernetes credentials
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CA_CERT }}" | base64 -d > /tmp/ca.crt
          kubectl config set-cluster dataviz-cluster \
            --server=${{ secrets.KUBE_SERVER }} \
            --certificate-authority=/tmp/ca.crt \
            --embed-certs=true
          kubectl config set-credentials github-actions \
            --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context dataviz \
            --cluster=dataviz-cluster \
            --user=github-actions \
            --namespace=dataviz
          kubectl config use-context dataviz

      - name: 🎯 Deploy to Kubernetes
        run: |
          helm upgrade --install dataviz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/dataviz \
            --version ${{ needs.prepare.outputs.version }} \
            --namespace dataviz \
            --reuse-values \
            --set webapp.image.tag="${{ needs.prepare.outputs.version }}" \
            --set server.image.tag="${{ needs.prepare.outputs.version }}" \
            --wait \
            --timeout=10m \
            --atomic

      - name: ✅ Verify deployment
        run: |
          kubectl rollout status deployment/dataviz-webapp -n dataviz
          kubectl rollout status deployment/dataviz-server -n dataviz
          echo "✅ Deployed version ${{ needs.prepare.outputs.version }} to dataviz"

  deploy-test:
    name: 🧪 Deploy to Test Environment
    runs-on: arc-runner-italia
    needs: [prepare, build-images, package-helm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: test
    permissions:
      contents: read
      packages: read
    steps:
      - name: ⚓ Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Helm Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: 🛠️ Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: 🔗 Setup Kubernetes credentials
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CA_CERT }}" | base64 -d > /tmp/ca.crt
          kubectl config set-cluster dataviz-cluster \
            --server=${{ secrets.KUBE_SERVER }} \
            --certificate-authority=/tmp/ca.crt \
            --embed-certs=true
          kubectl config set-credentials github-actions \
            --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context dataviz-test \
            --cluster=dataviz-cluster \
            --user=github-actions \
            --namespace=dataviz-test
          kubectl config use-context dataviz-test

      - name: 🎯 Deploy to dataviz-test
        run: |
          helm upgrade --install dataviz-test \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/dataviz \
            --version ${{ needs.prepare.outputs.version }} \
            --namespace dataviz-test \
            --reuse-values \
            --set webapp.image.tag="${{ needs.prepare.outputs.version }}" \
            --set server.image.tag="${{ needs.prepare.outputs.version }}" \
            --wait \
            --timeout=10m \
            --atomic

      - name: ✅ Verify deployment
        run: |
          kubectl rollout status deployment/dataviz-test-webapp -n dataviz-test
          kubectl rollout status deployment/dataviz-test-server -n dataviz-test
          echo "✅ Deployed version ${{ needs.prepare.outputs.version }} to dataviz-test"
