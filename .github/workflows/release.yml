name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: italia

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: 📋 Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_production: ${{ steps.version.outputs.is_production }}
    steps:
      - name: 🏷️ Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_PRODUCTION="true"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="0.0.0-test.${SHORT_SHA}"
            IS_PRODUCTION="false"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_production=$IS_PRODUCTION" >> $GITHUB_OUTPUT

  build-images:
    name: 🏗️ Build Docker Images
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - component: webapp
            dockerfile: packages/webapp/Dockerfile
            image: dataviz-webapp
          - component: server
            dockerfile: packages/server/Dockerfile.app
            image: dataviz-srv
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push ${{ matrix.component }} Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  package-helm:
    name: 📦 Package Helm Chart
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚓ Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: 📦 Package and push Helm chart
        run: |
          helm package ./charts/dataviz --version ${{ needs.prepare.outputs.version }}
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          helm push dataviz-${{ needs.prepare.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build-images, package-helm]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: read
      id-token: write
    environment:
      name: production
    steps:
      - name: ⚓ Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Helm Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: ☁️ Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🔗 Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: 🎯 Deploy to Kubernetes
        run: |
          NAMESPACE="dataviz"
          helm upgrade --install dataviz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/dataviz \
            --version ${{ needs.prepare.outputs.version }} \
            --namespace $NAMESPACE \
            --create-namespace \
            --reuse-values \
            --set webapp.image.tag="${{ needs.prepare.outputs.version }}" \
            --set server.image.tag="${{ needs.prepare.outputs.version }}" \
            --wait \
            --timeout=10m \
            --atomic

      - name: ✅ Verify deployment
        run: |
          NAMESPACE="dataviz"
          kubectl rollout status deployment/dataviz-webapp -n $NAMESPACE
          kubectl rollout status deployment/dataviz-server -n $NAMESPACE
          echo "✅ Deployed version ${{ needs.prepare.outputs.version }} to $NAMESPACE"

  deploy-test:
    name: 🧪 Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: [prepare, build-images, package-helm]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref_name == 'main') && !startsWith(github.ref, 'refs/tags/')
    environment:
      name: test
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: ⚓ Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login to Helm Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: ☁️ Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🔗 Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: 🎯 Deploy to dataviz-test
        run: |
          helm upgrade --install dataviz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/dataviz \
            --version ${{ needs.prepare.outputs.version }} \
            --namespace dataviz-test \
            --create-namespace \
            --reuse-values \
            --set webapp.image.tag="${{ needs.prepare.outputs.version }}" \
            --set server.image.tag="${{ needs.prepare.outputs.version }}" \
            --wait \
            --timeout=10m \
            --atomic

      - name: ✅ Verify deployment
        run: |
          kubectl rollout status deployment/dataviz-webapp -n dataviz-test
          kubectl rollout status deployment/dataviz-server -n dataviz-test
          echo "✅ Deployed version ${{ needs.prepare.outputs.version }} to dataviz-test"
