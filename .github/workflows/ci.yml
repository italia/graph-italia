name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and Test
        # Use Dockerfile.test to ensure consistent environment with production
        # This replicates the exact same build process as production Dockerfiles
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.test
          push: false
          tags: dataviz-test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Future: Add test execution step when tests are implemented
      # - name: Run Tests
      #   run: |
      #     docker run --rm dataviz-test:${{ github.sha }} bun test
