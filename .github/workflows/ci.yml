name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.27

      - name: Install Deps
        # Install dependencies, excluding ui-example-app which uses link: protocol
        # Note: Cannot use --frozen-lockfile with --filter when lockfile includes filtered package
        run: bun install --filter '!dataviz-uiexampleapp'
      - name: Run Build
        # Build only packages that don't use link: protocol
        run: bun run build:components && bun run build:webapp
