# Service Account for GitHub Actions CI/CD
# This service account is used to deploy to dataviz and dataviz-test namespaces only
---
apiVersion: v1
kind: Namespace
metadata:
  name: dataviz
---
apiVersion: v1
kind: Namespace
metadata:
  name: dataviz-test
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: dataviz
---
# Secret for long-lived token (required for external access)
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-deployer-token
  namespace: dataviz
  annotations:
    kubernetes.io/service-account.name: github-actions-deployer
type: kubernetes.io/service-account-token

