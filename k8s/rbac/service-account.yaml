# Service Account for GitHub Actions CI/CD
# This service account is used to deploy to graph-italia and graph-italia-test namespaces only
---
apiVersion: v1
kind: Namespace
metadata:
  name: graph-italia
---
apiVersion: v1
kind: Namespace
metadata:
  name: graph-italia-test
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: graph-italia
---
# Secret for long-lived token (required for external access)
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-deployer-token
  namespace: graph-italia
  annotations:
    kubernetes.io/service-account.name: github-actions-deployer
type: kubernetes.io/service-account-token

