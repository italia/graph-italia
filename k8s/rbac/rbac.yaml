# RBAC configuration for GitHub Actions deployer
# Grants permissions to deploy Helm charts to dataviz and dataviz-test namespaces
---
# ClusterRole with permissions needed for Helm deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: helm-deployer
rules:
  # Core resources for deployments
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Deployments and scaling
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Ingress resources
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Policy
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Network policies
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events (for debugging)
  - apiGroups: [""]
    resources:
      - events
    verbs: ["get", "list", "watch"]
  # Batch jobs (for migrations, seeds)
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Prometheus Operator resources (monitoring)
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - servicemonitors
      - prometheusrules
      - alertmanagerconfigs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# RoleBinding for dataviz namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer-binding
  namespace: dataviz
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
    namespace: dataviz
roleRef:
  kind: ClusterRole
  name: helm-deployer
  apiGroup: rbac.authorization.k8s.io
---
# RoleBinding for dataviz-test namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployer-binding
  namespace: dataviz-test
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
    namespace: dataviz
roleRef:
  kind: ClusterRole
  name: helm-deployer
  apiGroup: rbac.authorization.k8s.io
---
# RoleBinding for monitoring namespace (for AlertmanagerConfig)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dataviz-deployer-binding
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
    namespace: dataviz
roleRef:
  kind: ClusterRole
  name: helm-deployer
  apiGroup: rbac.authorization.k8s.io
